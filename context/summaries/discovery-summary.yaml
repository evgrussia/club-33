      - "Пороги 0★/1★/2★/3★/4★ (или принять DEC-R-004 — конфигурируемо)"
      - "Коэффициент месячной деградации балла"
      - "Механизм неактивности (60 дней vs N сообщений)"
      - "Финальный текст «Закона клуба» + фраза согласия"
      - "Политика возвратов (full / pro-rated / non-refundable)"
      - "Серьёзность жалоб (категории) и пенальти"
    with_developer:
      - "Combat-бот юзернейм/скриншоты"
      - "club33calendar существует?"
      - "N confirmations для USDT TRC20/TON"
      - "Forex API источник по умолчанию (предложение Orch: ЦБ РФ)"

  next_phase: "Phase 4 — Design"
  next_actions:
