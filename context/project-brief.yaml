project_brief:
  name: "Клуб 33"
  goal: "Telegram-бот и web-админка для закрытого клуба: оплата подписки, выдача доступа, социальный слой (роли, респекты, звёзды, жалобы), валюта времени и AI-сервисы (матчинг, KB, пульс)."
  target_users:
    - "Кандидаты в клуб (через Google-форму и ручную модерацию)"
    - "Участники клуба (платная подписка 6/12 мес, либо lifetime)"
    - "Администраторы и модераторы клуба (web-админка, чат-команды)"
    - "Основатель клуба (интервью, финальное одобрение, lifetime-выдача)"

  scope:
    in:
      # Фаза 1 — базовый бот
      - "Telegram-бот: /start, презентация, подача заявки через Google-форму"
      - "Ручная модерация заявок в web-админке"
      - "Платежи: USDT (TRC20/TON), СБП, ЮKassa (RUB) с фиксацией курса USD→RUB"
      - "Webhook-подтверждение оплаты (USDT, ЮKassa); ручная сверка СБП"
      - "Календарь записи на интервью с основателем (club33calendar или Calendly)"
      - "FSM: ожидание интервью → принятие закона клуба (ручной ввод фразы) → onboarding"
      - "Одноразовые invite-ссылки в канал и чат (лимит 1, TTL 24ч, настраиваемо)"
      - "Раздел «Мой доступ»: статус, тариф, дата окончания, продление, напоминания (<10 дней)"
      - "Web-админка: пользователи, заявки, очередь интервью, финансы, воронка, контроль оплат, экспорт CSV/Excel"
      - "Уведомления админам в админ-чат"
      # Фаза 2 — социальный слой + AI
      - "CRUD ролей (ниш) в админке, назначение на интервью; KYC-флаг вручную"
      - "Mini-app (Telegram WebApp): профиль, респект, дар времени, матчинг, digest, жалоба"
      - "Респекты: 30/мес, лимит 3 на получателя, обновление 1-го числа 00:00 МСК"
      - "Звёзды (0–4) с формулой репутации, деградацией и падением от неактивности"
      - "Жалобы анонимные для получателя, модерация админом"
      - "AI-матчинг (/match), база знаний RAG (/ask), еженедельный digest (/digest) — Anthropic Claude"
      - "Listener-бот для индексации чата клуба (с согласия в «законе клуба»)"
      # Фаза 3 — экономика времени
      - "Дар времени (1 день = 2.5 USD), команда /gift, условие 30+ дней остатка"
      - "Сжигание дней /burn в пользу клуба"
      - "Lifetime годовой бюджет 33 дня для дарения"
      - "Админ-конвертер «доллары — дни», ручное списание/начисление с логом"
      - "Реакция-стикер в чате как способ дать респект"
      - "Дашборд AI: качество матчинга, KB-метрики, расходы на inference"
    out:
      - "Пробный/триальный доступ"
      - "Self-service KYC через провайдеров (на старте — вручную)"
      - "Оплата зарубежной картой на старте (архитектурно заложено на будущее)"
      - "Поддержка 24/7 (на старте — рабочее время команды)"
      - "Мобильное нативное приложение (только Telegram + web-админка)"
      - "Маркетплейс услуг с расчётом днями (Фаза 4, опционально, за рамками MVP)"
      - "Партнёрские/реферальные программы (архитектурно заложено)"

  constraints:
    - "Тон коммуникации — на «ты», дружелюбно, коротко"
    - "Бот должен быть администратором канала и чата (для invite-ссылок)"
    - "Принятие закона клуба — ручной ввод фразы, не кнопка (осознанное согласие)"
    - "Подтверждение оплаты ожидаемое — 5–10 минут; >10 мин → кнопка «Поддержка»"
    - "AI-провайдер: только Anthropic (Claude) с оркестрацией моделей под задачи"
    - "Курс USD→RUB фиксируется на момент создания инвойса"
    - "Релиз поэтапный: Фаза 1 → Фаза 2 → Фаза 3"
    - "Архитектура должна позволять: новые тарифы, оплата картой, партнёрки, рефералы, маркетплейс"

  tech_stack:
    frontend_admin: "React 18 + Vite 6 (web-админка)"
    miniapp: "Telegram WebApp — React+Vite или нативный HTML (открытый вопрос)"
    backend: "Django 5 + DRF (REST API)"
    database: "PostgreSQL 16 + pgvector (embeddings 1536)"
    cache: "Redis 7"
    bot: "Python (aiogram/pyTelegramBotAPI — TBD на этапе Architecture)"
    ai: "Anthropic Claude (LangChain опционально для RAG/оркестрации)"
    scheduler: "APScheduler (digest, баланс респектов, напоминания)"
    payments: "USDT (TRC20/TON провайдер), ЮKassa SDK, СБП (ручная сверка)"
    infra: "Docker, Nginx, VPS Ubuntu 24.04 LTS"
    auth_miniapp: "JWT на основе Telegram init_data"

  starter_template:
    reference: "context/STARTER-TEMPLATE.md"
    status: "ОТСУТСТВУЕТ — проектируем с нуля под целевой стек из CLAUDE.md"
    note: "Если шаблон появится — Architect Agent адаптирует архитектуру"

  domain: "Закрытое сообщество / Community SaaS / Telegram Mini-App"

  release_phases:
    phase_1: "Базовый бот: воронка, оплаты, доступ, минимальная админка"
    phase_2: "Социальный слой + AI-матчинг + база знаний + digest"
    phase_3: "Экономика времени (дар, сжигание, lifetime-бюджет, реакция-стикер)"

  open_questions:
    with_club_team:
      - "Коэффициент деградации балла репутации в месяц"
      - "Пороги звёзд (баллы для 0★/1★/2★/3★/4★)"
      - "Механизм падения от неактивности (60 дней или N сообщений)"
      - "Точная формулировка фразы согласия и финальный текст «Закона клуба»"
    with_developer:
      - "Уровень админ-ролей (super/модератор/support или один)"
      - "Mini-app стек: React+Vite или нативный HTML"
      - "Combat-бот как референс UI — права на использование паттернов"
      - "Оркестрация AI-моделей внутри Anthropic под задачи"
      - "Календарь: club33calendar vs Calendly"
      - "Источник курса USD→RUB для ЮKassa"

  source: "docs/Club 33 — ТЗ v5 (финал, 2026-05-05).pdf"
  created_at: "2026-05-15"
  created_by: "Orchestrator Agent"
