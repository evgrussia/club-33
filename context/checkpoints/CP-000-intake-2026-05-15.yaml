    3 фазы релиза: (1) базовый бот + платежи + админка, (2) социальный слой + AI,
    (3) экономика времени. Стартовый шаблон отсутствует — проектируем под
    Django 5 + DRF + React 18 + Vite 6 + PostgreSQL + Redis + Anthropic Claude.
    Active Roster: все 19 базовых агентов активны; новые навыки требуются для
    Anthropic-оркестрации и USDT-платежей. Готов к Discovery.

