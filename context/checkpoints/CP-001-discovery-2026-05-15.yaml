      rationale: "DEC-R-004: команда клуба сможет калибровать на первых месяцах без релиза. Снимает блок OD-CLUB-01..03 для разработки."
      stakeholder: "Research + Orchestrator"
    - id: "DEC-013"
      decision: "Перейти к Phase 4 — Design параллельно с эскалацией оставшихся open questions"
      rationale: "Discovery даёт достаточно материала для user flows и wireframes. Open questions (текст закона, политика возвратов) не блокируют дизайн, нужны к Architecture Gate."
