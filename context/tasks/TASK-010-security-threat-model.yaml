          description: "Инвентаризация 24 секретов, Vault, ротация, gitleaks, bootstrap, runbooks"
      decisions:
        - id: "DEC-SEC-001"
          decision: "Допуск ±0.5% по сумме для USDT (BA-decision подтверждён); webhook + двойная сверка GET-API для ЮKassa"
          rationale: "Защита от webhook spoofing даже при компрометации HMAC secret"
        - id: "DEC-SEC-002"
          decision: "2FA (TOTP) обязателен для всех админ-ролей (Super/Mod/Support)"
          rationale: "Компрометация Super = доступ ко всему; защита от brute-force"
        - id: "DEC-SEC-003"
          decision: "PII redaction перед отправкой в Anthropic (regex email/phone + presidio Phase 2)"
          rationale: "Соответствие 152-ФЗ при трансграничной передаче"
        - id: "DEC-SEC-004"
          decision: "PostgreSQL primary в РФ (рекомендация Selectel/VK/Yandex)"
          rationale: "152-ФЗ ст.18 п.5 — локализация ПДн граждан РФ"
        - id: "DEC-SEC-005"
          decision: "Vault для секретов в Phase 2+; /opt/club33/.env chmod 600 для Phase 1 MVP"
          rationale: "Баланс security vs. complexity для MVP"
        - id: "DEC-SEC-006"
          decision: "AES-256-GCM для KYC данных при включении функции (поле-level encryption)"
          rationale: "1-2 уровень защиты по 152-ФЗ для спец. категорий"
        - id: "DEC-SEC-007"
          decision: "Listener индексирует ТОЛЬКО при law_accepted_at IS NOT NULL + opt-out команда /optout_kb"
          rationale: "Явное согласие + контроль пользователя над своими данными"

