      - action: "Security Agent: threat model оплат (webhook signature, идемпотентность, повторные попытки)"
        agent: "Security"
        priority: "high"
      - action: "Content Agent: тексты уведомлений (отказ заявки, late_payment, благодарность за /burn, отказ респекта)"
        agent: "Content"
        priority: "medium"
      - action: "Уточнить с командой клуба: пороги звёзд, коэффициент деградации, политика возвратов"
        agent: "Orchestrator"
        priority: "medium"

