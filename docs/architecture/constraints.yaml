# docs/architecture/constraints.yaml
# Архитектурные ограничения «Клуба 33»
# Created by: Architect Agent | 2026-05-16 | v1.0 | Phase: Architecture

version: "1.0"
project: "Клуб 33"

layer_rules:
  - id: "LR-001"
    name: "Backend не зависит от Frontend"
    severity: "error"
    scope: "backend"
    rule: "backend/ must not import from frontend/ or miniapp/"
    description: "Backend (Django) не должен содержать импортов из frontend-кода"

  - id: "LR-002"
    name: "Services не зависят от Views"
    severity: "error"
    scope: "backend"
    rule: "*/services.py and */services/** must not import from */views.py or */views/**"
    description: "Слой бизнес-логики не должен зависеть от слоя представления (DRF views)"

  - id: "LR-003"
    name: "Models не зависят от Services"
    severity: "error"
    scope: "backend"
    rule: "*/models.py must not import from */services.py or */views.py"
    description: "ORM-модели — чистый слой данных"

  - id: "LR-004"
    name: "Domain не зависит от Infrastructure"
    severity: "error"
    scope: "backend"
    rule: "*/domain/** must not import from */infrastructure/** or django.db.models"
    description: "DDD: Domain не знает про БД, ORM, внешние API. Только в bounded contexts с явным domain-слоем."

  - id: "LR-005"
    name: "Bot не зависит от Web-views"
    severity: "error"
    scope: "bot"
    rule: "bot/ must not import from */views/**"
    description: "Telegram-бот использует только services (бизнес-логику), а не HTTP-views"

  - id: "LR-006"
    name: "Worker не зависит от Views"
    severity: "error"
    scope: "worker"
    rule: "worker/ must not import from */views/**"
    description: "Scheduler-задачи используют только services и models"

  - id: "LR-007"
    name: "Listener изолирован"
    severity: "error"
    scope: "listener"
    rule: "listener/ must not import from bot/ or miniapp/"
    description: "Listener Bot — отдельный процесс, общается с API только через сервисы"

dependency_rules:
  - id: "DR-001"
    name: "Нет циклических зависимостей между Django apps"
    severity: "error"
    scope: "all"
    rule: "no circular dependencies"
    description: "Циклические импорты между apps запрещены"

  - id: "DR-002"
    name: "Core — базовый модуль"
    severity: "error"
    scope: "backend"
    rule: "core must not import from other project apps (except django/stdlib)"
    description: "core содержит общие утилиты, AuditLog, middleware и не зависит от бизнес-доменов"

  - id: "DR-003"
    name: "Users — фундаментальный модуль"
    severity: "error"
    scope: "backend"
    rule: "users must only import from core"
    description: "Users — фундамент идентификации, не зависит от платежей/подписок/социал"

  - id: "DR-004"
    name: "Listener только записывает"
    severity: "warning"
    scope: "backend"
    rule: "listener app must only write to: ai_services (embeddings), audit"
    description: "Listener не должен модифицировать сущности других контекстов"

  - id: "DR-005"
    name: "AI как читатель"
    severity: "warning"
    scope: "backend"
    rule: "ai_services must not write to: payments, subscriptions, access_control, social.respects"
    description: "AI-сервисы только читают данные других контекстов; пишут только в свои таблицы (ai_usage_log, embeddings, feedback)"

  - id: "DR-006"
    name: "Frontend boundaries"
    severity: "warning"
    scope: "frontend"
    rule: "components must not import from pages"
    description: "Переиспользуемые компоненты не должны зависеть от страниц"

naming_rules:
  - id: "NR-001"
    name: "Django app naming"
    severity: "warning"
    scope: "backend"
    rule: "app directories must use snake_case"
    description: "Имена Django apps — snake_case (например, time_economy, access_control)"

  - id: "NR-002"
    name: "React component naming"
    severity: "warning"
    scope: "frontend"
    rule: "component files must use PascalCase"
    description: "Имена React-компонентов — PascalCase (Button.jsx, MatchCard.jsx)"

  - id: "NR-003"
    name: "Story files naming"
    severity: "warning"
    scope: "frontend"
    rule: "story files must match component name + .stories.jsx"
    description: "Button.jsx → Button.stories.jsx (rule 08 IfaC)"

  - id: "NR-004"
    name: "Migration naming"
    severity: "warning"
    scope: "backend"
    rule: "migrations must have descriptive names, not just '0002_auto'"
    description: "0002_add_subscription_renewal_reminder.py — описательно"

  - id: "NR-005"
    name: "Endpoint naming"
    severity: "warning"
    scope: "backend"
    rule: "REST endpoints in kebab-case, plural nouns"
    description: "/api/v1/respects/, /api/v1/invite-links/"

  - id: "NR-006"
    name: "ADR naming"
    severity: "warning"
    scope: "docs"
    rule: "ADR files: ADR-NNN-kebab-case-title.md"
    description: "ADR-001-tech-stack.md"

size_rules:
  - id: "SR-001"
    name: "Максимальный размер файла"
    severity: "warning"
    scope: "all"
    rule: "files must not exceed 500 lines"
    description: "Файлы > 500 строк — кандидат на декомпозицию"

  - id: "SR-002"
    name: "Максимальный размер функции"
    severity: "warning"
    scope: "all"
    rule: "functions must not exceed 50 lines"
    description: "Функции > 50 строк — кандидат на разбиение"

  - id: "SR-003"
    name: "Максимальный размер класса"
    severity: "warning"
    scope: "backend"
    rule: "classes must not exceed 300 lines"
    description: "Большие классы — нарушение SRP"

  - id: "SR-004"
    name: "Максимальный размер React-компонента"
    severity: "warning"
    scope: "frontend"
    rule: "react components must not exceed 250 lines (excluding styles)"
    description: "Большие компоненты — кандидаты на декомпозицию"

  - id: "SR-005"
    name: "Сложность функции"
    severity: "warning"
    scope: "all"
    rule: "cyclomatic complexity must not exceed 10"
    description: "Высокая цикломатическая сложность снижает читаемость"

security_rules:
  - id: "SEC-001"
    name: "Нет хардкода секретов"
    severity: "error"
    scope: "all"
    rule: "no hardcoded API keys, tokens, passwords in source"
    description: "Все секреты — через env vars или vault"

  - id: "SEC-002"
    name: "Webhook idempotency"
    severity: "error"
    scope: "backend"
    rule: "all payment webhooks must use idempotency by external_id"
    description: "Защита от повторной обработки webhook"

  - id: "SEC-003"
    name: "RBAC на admin endpoints"
    severity: "error"
    scope: "backend"
    rule: "all admin endpoints must have explicit permission decorator"
    description: "Каждый admin endpoint проверяет роль (super/moderator/support) — DEC-005"

