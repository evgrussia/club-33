# docs/architecture/fitness-functions.yaml
# Fitness functions — автоматические проверки архитектуры
# Created by: Architect Agent | 2026-05-16 | v1.0 | Phase: Architecture

version: "1.0"
project: "Клуб 33"

fitness_functions:
  - id: "FF-001"
    name: "Dependency rules между Django apps"
    type: "dependency"
    check: "Импорты между apps соответствуют dependency-rules.yaml (allowed_imports)"
    tool: "import-linter"
    config_file: ".importlinter"
    ci_stage: "lint"
    severity: "error"
    threshold: "0 violations"

  - id: "FF-002"
    name: "Layer rules внутри Django apps"
    type: "layer"
    check: "services не импортирует views, models не импортирует services, domain не зависит от infrastructure"
    tool: "import-linter"
    config_file: ".importlinter"
    ci_stage: "lint"
    severity: "error"
    threshold: "0 violations"

  - id: "FF-003"
    name: "Отсутствие циклических зависимостей"
    type: "dependency"
    check: "Нет циклических импортов между модулями backend и frontend"
    tool: "import-linter (backend) + dependency-cruiser (frontend)"
    ci_stage: "lint"
    severity: "error"
    threshold: "0 cycles"

  - id: "FF-004"
    name: "OpenAPI schema актуален и валиден"
    type: "interface"
    check: "openapi.yaml генерируется без ошибок и совпадает с committed версией"
    tool: "drf-spectacular + openapi-diff"
    ci_stage: "test"
    severity: "error"
    threshold: "0 breaking changes без ADR"

  - id: "FF-005"
    name: "Frontend boundaries (mini-app + admin)"
    type: "dependency"
    check: "components не импортируют pages; features изолированы по контекстам"
    tool: "eslint-plugin-boundaries"
    config_file: "eslint.config.js"
    ci_stage: "lint"
    severity: "warning"
    threshold: "0 violations"

  - id: "FF-006"
    name: "Размер бандла mini-app"
    type: "performance"
    check: "Mini-app JS bundle gzipped"
    tool: "vite-plugin-bundle-analyzer"
    ci_stage: "build"
    severity: "warning"
    threshold: "< 500 KB gzipped (initial chunk)"

  - id: "FF-007"
    name: "Test coverage"
    type: "quality"
    check: "Покрытие тестами по слоям"
    tool: "pytest-cov (backend) + vitest --coverage (frontend)"
    ci_stage: "test"
    severity: "error"
    threshold: "Domain ≥ 90%, Application ≥ 80%, Infrastructure ≥ 70%, Frontend ≥ 70%"

  - id: "FF-008"
    name: "Storybook build"
    type: "interface"
    check: "Storybook собирается без ошибок, все компоненты имеют stories"
    tool: "storybook build"
    ci_stage: "build"
    severity: "error"
    threshold: "0 build errors, 100% покрытие переиспользуемых компонентов stories"

  - id: "FF-009"
    name: "Visual regression"
    type: "interface"
    check: "Скриншоты страниц совпадают с baseline"
    tool: "@playwright/test --reporter=html"
    config_file: "frontend/tests/visual/playwright.config.js"
    ci_stage: "test"
    severity: "error"
    threshold: "diff < 2% от baseline (см. visual-regression-config.yaml)"

  - id: "FF-010"
    name: "Security: нет хардкода секретов"
    type: "security"
    check: "Нет API keys, токенов, паролей в исходниках"
    tool: "gitleaks + trufflehog"
    ci_stage: "lint"
    severity: "error"
    threshold: "0 leaked secrets"

  - id: "FF-011"
    name: "Dependency vulnerabilities"
    type: "security"
    check: "Зависимости без известных critical/high уязвимостей"
    tool: "pip-audit (backend) + npm audit (frontend)"
    ci_stage: "test"
    severity: "warning"
    threshold: "0 critical, 0 high"

  - id: "FF-012"
    name: "AI cost guardrail"
    type: "cost"
    check: "Стоимость Claude inference на активного участника"
    tool: "ai_usage_log aggregation в worker (cron daily)"
    ci_stage: "runtime"
    severity: "warning"
    threshold: "≤ $2 USD/user/month (DEC-A-002)"

  - id: "FF-013"
    name: "Payment webhook idempotency"
    type: "correctness"
    check: "Webhook ЮKassa/USDT не создаёт дублей при повторной доставке"
    tool: "integration test + production metric"
    ci_stage: "test"
    severity: "error"
    threshold: "0 duplicate payment confirmations"

